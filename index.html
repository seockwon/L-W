<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리눅스 월드 RPG — ISO Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0c10;overflow:hidden;font-family:'Share Tech Mono',monospace;
  display:flex;flex-direction:column;height:100vh;width:100vw}

/* ── TOP BAR ── */
#topbar{height:44px;background:linear-gradient(180deg,#0f1520,#0a0e18);
  border-bottom:2px solid #1e3a5f;display:flex;align-items:center;
  padding:0 12px;gap:16px;flex-shrink:0;position:relative;z-index:10}
.logo{font-family:'Press Start 2P',monospace;font-size:9px;color:#00e5ff;
  text-shadow:0 0 10px #00e5ff;white-space:nowrap}
.hud-stat{display:flex;align-items:center;gap:5px}
.hud-label{font-size:9px;color:#546e7a;white-space:nowrap}
.bar-wrap{width:90px;height:8px;background:rgba(0,0,0,.6);border:1px solid #1e3a5f;border-radius:1px;overflow:hidden}
.bar-inner{height:100%;border-radius:1px;transition:width .3s}
.bar-hp{background:linear-gradient(90deg,#b71c1c,#ef5350)}
.bar-mp{background:linear-gradient(90deg,#1565c0,#42a5f5)}
.bar-xp{background:linear-gradient(90deg,#e65100,#ffa726)}
.hud-val{font-size:8px;color:#90a4ae;min-width:42px}
.sep{width:1px;height:24px;background:#1e3a5f;margin:0 4px}

/* difficulty */
.diff-btns{display:flex;gap:4px;margin-left:auto}
.diff-btn{font-family:'Press Start 2P',monospace;font-size:6px;padding:4px 7px;
  border:1px solid #1e3a5f;background:rgba(0,0,0,.5);color:#546e7a;cursor:pointer;border-radius:2px;transition:all .2s}
.diff-btn:hover{border-color:#00e5ff;color:#00e5ff}
.diff-btn.active-normal{border-color:#00e676;color:#00e676;background:rgba(0,230,118,.08)}
.diff-btn.active-hard{border-color:#ff6d00;color:#ff6d00;background:rgba(255,109,0,.08)}
.diff-btn.active-hell{border-color:#ff1744;color:#ff1744;background:rgba(255,23,68,.08)}
.lvl-badge{font-family:'Press Start 2P',monospace;font-size:8px;color:#ffd740;
  text-shadow:0 0 8px #ffd740;white-space:nowrap}

/* ── MAIN AREA ── */
#main{flex:1;display:flex;overflow:hidden}
#gameCanvas{display:block;cursor:crosshair;flex:1;min-width:0}

/* ── RIGHT PANEL ── */
#rightPanel{width:300px;flex-shrink:0;background:#090c14;
  border-left:2px solid #1e3a5f;display:flex;flex-direction:column;overflow:hidden}

/* minimap */
#minimapWrap{padding:10px;border-bottom:1px solid #1e3a5f}
.panel-title{font-family:'Press Start 2P',monospace;font-size:7px;color:#ffd740;
  text-shadow:0 0 6px #ffd740;margin-bottom:6px}
#minimap{width:100%;height:120px;background:#050810;border:1px solid #1e3a5f;border-radius:2px}

/* battle / info zone */
#infoZone{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* monster encounter */
#encounterBox{display:none;flex-direction:column;padding:10px;border-bottom:1px solid #1e3a5f}
#encounterBox.show{display:flex}
.enc-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
#encMonsterSprite{font-size:32px;filter:drop-shadow(0 0 8px rgba(255,100,50,.6));
  animation:eFloat 2s ease-in-out infinite}
@keyframes eFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
#encMonsterName{font-family:'Press Start 2P',monospace;font-size:8px;color:#ff5252;
  text-shadow:0 0 8px #ff5252}
.enc-hp-wrap{width:100%;height:8px;background:rgba(0,0,0,.6);
  border:1px solid #1e3a5f;border-radius:1px;overflow:hidden;margin-bottom:8px}
.enc-hp-fill{height:100%;background:linear-gradient(90deg,#880e4f,#e91e63);transition:width .4s}

/* dialogue */
#dialogueWrap{padding:8px 10px;border-bottom:1px solid rgba(30,58,95,.5)}
#dlgSpeaker{font-family:'Press Start 2P',monospace;font-size:7px;color:#ff6d00;
  text-shadow:0 0 6px #ff6d00;margin-bottom:5px}
#dlgText{font-size:11px;color:#cfd8dc;line-height:1.65;min-height:44px}
.dlg-cur{display:inline-block;width:7px;height:12px;background:#00e5ff;
  margin-left:2px;animation:blink .8s step-end infinite;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* terminal */
#termWrap{padding:8px 10px;flex:1;display:flex;flex-direction:column}
.term-hdr{font-family:'Press Start 2P',monospace;font-size:7px;color:#00e676;
  text-shadow:0 0 6px #00e676;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.tdot{width:6px;height:6px;border-radius:50%}
.tdr{background:#ff5f57}.tdy{background:#ffbd2e}.tdg{background:#28c940}
#termLog{flex:1;overflow-y:auto;font-size:11px;line-height:1.5;padding:5px;
  background:rgba(0,8,0,.6);border:1px solid rgba(0,230,118,.12);border-radius:2px;
  margin-bottom:6px;max-height:120px}
#termLog::-webkit-scrollbar{width:3px}
#termLog::-webkit-scrollbar-thumb{background:#00e676}
.tl-ok{color:#00e676}.tl-err{color:#ff1744}.tl-info{color:#00e5ff}
.tl-flag{color:#ffd740;font-weight:700}.tl-sys{color:#37474f}
#termRow{display:flex;align-items:center;gap:6px}
#termPrompt{font-family:'Press Start 2P',monospace;font-size:7px;color:#00e676;flex-shrink:0}
#termInput{flex:1;background:transparent;border:none;outline:none;
  font-family:'Share Tech Mono',monospace;font-size:13px;color:#00e676;caret-color:#00e676}
#termInput::placeholder{color:rgba(0,230,118,.2)}

/* skill reveal */
#skillReveal{padding:8px 10px;border-top:1px solid #1e3a5f;display:none}
#skillReveal.show{display:block}
.sk-title{font-family:'Press Start 2P',monospace;font-size:6px;color:#ffd740;margin-bottom:5px}
.sk-answer{font-size:11px;color:#ffd740;background:rgba(255,215,64,.06);
  border:1px solid rgba(255,215,64,.2);border-radius:2px;padding:5px 7px;
  font-family:'Share Tech Mono',monospace;cursor:pointer;transition:all .2s}
.sk-answer:hover{background:rgba(255,215,64,.12);border-color:rgba(255,215,64,.5)}

/* ── OVERLAY ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;
  align-items:center;justify-content:center;flex-direction:column;padding:16px}
#overlay.show{display:flex}
.ov-title{font-family:'Press Start 2P',monospace;font-size:clamp(14px,3vw,28px);
  margin-bottom:12px;animation:glow 1s ease-in-out infinite;text-align:center}
@keyframes glow{0%,100%{text-shadow:0 0 20px currentColor}50%{text-shadow:0 0 40px currentColor,0 0 60px currentColor}}
.ov-flag{font-family:'Press Start 2P',monospace;font-size:clamp(7px,1.5vw,9px);color:#ffd740;
  background:rgba(0,0,0,.9);border:2px solid #ffd740;padding:12px 18px;
  text-shadow:0 0 10px #ffd740;word-break:break-all;max-width:90vw;text-align:center;
  line-height:1.9;margin:8px}
.ov-hint{font-size:clamp(10px,2vw,11px);color:#546e7a;max-width:90vw;text-align:center;
  line-height:1.7;margin-bottom:12px}
.ov-btn{font-family:'Press Start 2P',monospace;font-size:8px;padding:9px 16px;
  border:1px solid #00e676;color:#00e676;background:transparent;border-radius:2px;cursor:pointer}
.ov-btn:hover{background:rgba(0,230,118,.1)}

/* effect banner */
#banner{position:fixed;top:60px;left:50%;transform:translateX(-50%);
  font-family:'Press Start 2P',monospace;font-size:10px;padding:8px 16px;
  border-radius:3px;z-index:50;pointer-events:none;opacity:0;
  transition:opacity .3s;white-space:nowrap}
#banner.show{opacity:1}
#banner.s{background:rgba(0,230,118,.15);border:1px solid #00e676;
  color:#00e676;text-shadow:0 0 10px #00e676}
#banner.f{background:rgba(255,23,68,.15);border:1px solid #ff1744;
  color:#ff1744;text-shadow:0 0 10px #ff1744}

/* tooltip */
#tooltip{position:fixed;background:rgba(5,10,20,.95);border:1px solid #1e3a5f;
  border-radius:3px;padding:6px 10px;font-size:11px;color:#cfd8dc;
  pointer-events:none;z-index:60;display:none;max-width:200px;line-height:1.5}

/* ── 모바일 전용 (세로 600px 이하 또는 폰 너비) ── */
@media (max-width: 700px) {
  body{overflow:hidden}

  /* 상단바 압축 */
  #topbar{height:38px;padding:0 8px;gap:6px;flex-wrap:nowrap;overflow:hidden}
  .logo{font-size:7px}
  .hud-label{display:none}
  .bar-wrap{width:55px;height:6px}
  .hud-val{display:none}
  .sep{display:none}
  .lvl-badge{font-size:6px;padding:2px 5px}
  .diff-btn{font-size:5px;padding:3px 5px}

  /* 세로 레이아웃: 캔버스 위, 패널 아래 */
  #main{flex-direction:column;overflow:hidden}

  /* 캔버스가 화면 60% 차지 */
  #gameCanvas{width:100%!important;flex:none;height:55vh}

  /* 오른쪽 패널 → 아래쪽 패널 */
  #rightPanel{
    width:100%!important;
    height:45vh;
    border-left:none;
    border-top:2px solid #1e3a5f;
    flex-direction:row;  /* 가로로 나란히 */
    overflow:hidden;
  }

  /* 미니맵 숨기기 (공간 부족) */
  #minimapWrap{display:none}

  /* 인포존이 전체 너비 */
  #infoZone{flex:1;min-width:0}

  /* 다이얼로그 압축 */
  #dialogueWrap{padding:5px 8px}
  #dlgText{font-size:10px;min-height:30px;line-height:1.5}
  #dlgSpeaker{font-size:6px;margin-bottom:3px}

  /* 터미널 압축 */
  #termWrap{padding:5px 8px}
  #termLog{max-height:60px;font-size:10px}
  #termInput{font-size:12px}

  /* 가상 방향키 패드 표시 */
  #mobileControls{display:flex}
}

/* 모바일 방향키 패드 */
#mobileControls{
  display:none;
  position:fixed;
  bottom:16px;
  left:16px;
  z-index:90;
  flex-direction:column;
  align-items:center;
  gap:4px;
  opacity:.75;
}
.dpad-row{display:flex;gap:4px}
.dpad-btn{
  width:44px;height:44px;
  background:rgba(0,229,255,.1);
  border:1px solid rgba(0,229,255,.3);
  border-radius:8px;
  font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#00e5ff;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.dpad-btn:active{background:rgba(0,229,255,.3)}
</style>
</head>
<body>

<!-- TOP HUD -->
<div id="topbar">

  <div class="sep"></div>

  <div class="hud-stat">
    <div class="hud-label">MP</div>

    <div class="hud-val" id="pMpVal">80/100</div>
  </div>
  <div class="hud-stat">
    <div class="hud-label">XP</div>
    <div class="bar-wrap"><div class="bar-inner bar-xp" id="pXpBar" style="width:0%"></div></div>

    <button class="diff-btn" id="btnHard" onclick="setDiff('hard')">HARD</button>
    <button class="diff-btn" id="btnHell" onclick="setDiff('hell')">HELL</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <canvas id="gameCanvas"></canvas>

  <!-- RIGHT PANEL -->
  <div id="rightPanel">
    <!-- Minimap -->
    <div id="minimapWrap">
      <div class="panel-title">🗺 MINIMAP</div>
      <canvas id="minimap"></canvas>
    </div>

    <!-- Info Zone -->
    <div id="infoZone">
      <!-- Encounter -->
      <div id="encounterBox">
        <div class="enc-header">
          <div id="encMonsterSprite">👹</div>
          <div>
            <div id="encMonsterName">???</div>
            <div style="font-size:10px;color:#546e7a;margin-top:3px" id="encMonsterDesc">???</div>
          </div>
        </div>
        <div class="enc-hp-wrap"><div class="enc-hp-fill" id="encHpFill" style="width:100%"></div></div>
      </div>

      <!-- Dialogue -->
      <div id="dialogueWrap">
        <div id="dlgSpeaker">시스템</div>
        <div id="dlgText">리눅스 월드에 오신 것을 환영합니다!<br>몬스터를 클릭하여 전투를 시작하세요.<br>방향키 또는 맵 클릭으로 이동합니다.<span class="dlg-cur"></span></div>
      </div>

      <!-- Terminal -->
      <div id="termWrap">
        <div class="term-hdr">
          <span class="tdot tdr"></span><span class="tdot tdy"></span><span class="tdot tdg"></span>
          TERMINAL
        </div>
        <div id="termLog">
          <div class="tl-sys">$ 리눅스 월드 v3.0 — ISO Edition</div>
          <div class="tl-info">$ 몬스터를 클릭하여 전투 시작!</div>
        </div>
        <div id="termRow">
          <span id="termPrompt">linux@world:~$</span>
          <input id="termInput" placeholder="명령어 입력..." autocomplete="off" spellcheck="false" disabled>
        </div>
      </div>

      <!-- Skill Reveal (difficulty dependent) -->
      <div id="skillReveal">
        <div class="sk-title">💡 공략 힌트</div>
        <div class="sk-answer" id="skAnswer" onclick="useHint()">클릭하면 터미널에 입력됩니다</div>
      </div>
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <div class="ov-title" id="ovTitle" style="color:#00e676">🏆 VICTORY!</div>
  <div id="ovMonster" style="font-family:'Press Start 2P',monospace;font-size:9px;color:#00e5ff;margin-bottom:10px"></div>
  <div class="ov-flag" id="ovFlag"></div>
  <div class="ov-hint" id="ovHint"></div>
  <button class="ov-btn" onclick="closeOverlay()">▶ 계속하기</button>
</div>

<!-- BANNER -->
<div id="banner"></div>
<!-- TOOLTIP -->
<div id="tooltip"></div>

<!-- 모바일 방향키 패드 -->
<div id="mobileControls">
  <div class="dpad-row">
    <div class="dpad-btn" id="dUp">▲</div>
  </div>
  <div class="dpad-row">
    <div class="dpad-btn" id="dLeft">◀</div>
    <div class="dpad-btn" id="dDown">▼</div>
    <div class="dpad-btn" id="dRight">▶</div>
  </div>
</div>

// CANVAS + ISOMETRIC ENGINE
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mm = document.getElementById('minimap');
const mmCtx = mm.getContext('2d');

const TW = 64, TH = 32; // tile width/height
const MAPW = 28, MAPH = 28;

// Resize canvas to fill available space (모바일/PC 분기)
function resizeCanvas() {
  const main = document.getElementById('main');
  const isMobile = window.innerWidth <= 700;
  if(isMobile){
    // 세로 레이아웃: 캔버스는 전체 너비, 높이는 55vh
    canvas.width = window.innerWidth;
    canvas.height = Math.floor(window.innerHeight * 0.55) - 38;
  } else {
    canvas.width = main.clientWidth - 300;
    canvas.height = main.clientHeight;
  }
  if(mm.offsetWidth > 0){
    mm.width = mm.offsetWidth;
    mm.height = mm.offsetHeight;
  }
}

// ── MAP GENERATION ────────────────────────────────────────────
const TILE_GRASS=0,TILE_DIRT=1,TILE_STONE=2,TILE_WATER=3,TILE_DARK=4,
      TILE_LAVA=5,TILE_SAND=6,TILE_SWAMP=8,TILE_RUNE=9;
let tileMap=[], heightMap=[];

function noise(x,y,s=0){const n=Math.sin(x*127.1+y*311.7+s*74.3)*43758.5453;return n-Math.floor(n);}
function smoothNoise(x,y,s=0){
  return noise(x,y,s)*.5+
    (noise(x-1,y,s)+noise(x+1,y,s)+noise(x,y-1,s)+noise(x,y+1,s))*.125;
}

const worldObjects=[];
function isPath(x,y){return x===13||x===14||y===13||y===14;}
function isOccupied(x,y){return worldObjects.some(o=>o.x===x&&o.y===y);}

function generateMap(){
  for(let y=0;y<MAPH;y++){tileMap[y]=[];heightMap[y]=[];for(let x=0;x<MAPW;x++){tileMap[y][x]=TILE_GRASS;heightMap[y][x]=0;}}

  // ZONE 0 (top-left 1-12): Green Forest
  for(let y=1;y<13;y++) for(let x=1;x<13;x++){
    const n=smoothNoise(x,y,1);
    tileMap[y][x]=n<.22?TILE_WATER:n<.38?TILE_DIRT:TILE_GRASS;
  }
  // ZONE 1 (top-right 15-26): Sandy Wasteland
  for(let y=1;y<13;y++) for(let x=15;x<27;x++){
    const n=smoothNoise(x,y,2);
    tileMap[y][x]=n<.18?TILE_STONE:n<.5?TILE_SAND:TILE_DIRT;
  }
  // ZONE 2 (bottom-left 15-26): Swamp/Lava
  for(let y=15;y<27;y++) for(let x=1;x<13;x++){
    const n=smoothNoise(x,y,3);
    tileMap[y][x]=n<.2?TILE_LAVA:n<.45?TILE_SWAMP:TILE_DIRT;
  }
  // ZONE 3 (bottom-right 15-26): Dark Realm
  for(let y=15;y<27;y++) for(let x=15;x<27;x++){
    const n=smoothNoise(x,y,4);
    tileMap[y][x]=n<.15?TILE_RUNE:TILE_DARK;
  }
  // Cross roads
  for(let x=1;x<MAPW-1;x++){tileMap[13][x]=TILE_DIRT;tileMap[14][x]=TILE_DIRT;}
  for(let y=1;y<MAPH-1;y++){tileMap[y][13]=TILE_DIRT;tileMap[y][14]=TILE_DIRT;}
  // Widen roads
  for(let x=2;x<MAPW-2;x++){if(noise(x,0,5)<.35){tileMap[12][x]=TILE_DIRT;tileMap[15][x]=TILE_DIRT;}}
  for(let y=2;y<MAPH-2;y++){if(noise(0,y,6)<.35){tileMap[y][12]=TILE_DIRT;tileMap[y][15]=TILE_DIRT;}}
  // Stone borders
  for(let i=0;i<MAPW;i++){tileMap[0][i]=TILE_STONE;tileMap[MAPH-1][i]=TILE_STONE;tileMap[i][0]=TILE_STONE;tileMap[i][MAPW-1]=TILE_STONE;}
  // Stone wall clusters (wasteland)
  [[18,4],[22,7],[24,3],[19,10],[25,9],[11,3],[10,9],[3,11]].forEach(([cx,cy])=>{
    for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
      const ny=cy+dy,nx=cx+dx;
      if(ny>0&&ny<MAPH-1&&nx>0&&nx<MAPW-1&&noise(nx,ny,7)>.3)tileMap[ny][nx]=TILE_STONE;
    }
  });

  // ── WORLD OBJECTS ──────────────────────────────────────────────
  worldObjects.length=0;
  // Trees — Zone 0 forest
  for(let y=1;y<12;y++) for(let x=1;x<12;x++){
    if(tileMap[y][x]===TILE_GRASS&&smoothNoise(x*2,y*2,8)>.68&&!isPath(x,y)&&!isOccupied(x,y))
      worldObjects.push({type:'tree',x,y,v:Math.floor(noise(x,y,9)*3)});
  }
  // Rocks — Zone 1 wasteland
  for(let y=1;y<12;y++) for(let x=15;x<27;x++){
    if(tileMap[y][x]===TILE_SAND&&smoothNoise(x,y*2,10)>.72&&!isPath(x,y)&&!isOccupied(x,y))
      worldObjects.push({type:'rock',x,y,v:Math.floor(noise(x,y,11)*3)});
  }
  // Dead trees — Zone 2 swamp
  for(let y=15;y<27;y++) for(let x=1;x<12;x++){
    if(tileMap[y][x]===TILE_SWAMP&&smoothNoise(x*3,y,12)>.74&&!isPath(x,y)&&!isOccupied(x,y))
      worldObjects.push({type:'deadtree',x,y});
  }
  // Skull piles — Zone 3 dark
  for(let y=15;y<27;y++) for(let x=15;x<27;x++){
    if(tileMap[y][x]===TILE_DARK&&noise(x,y*3,13)>.82&&!isPath(x,y)&&!isOccupied(x,y))
      worldObjects.push({type:'skull',x,y});
  }
  // Rune stones
  for(let y=15;y<27;y++) for(let x=15;x<27;x++){
    if(tileMap[y][x]===TILE_RUNE&&!isPath(x,y)&&!isOccupied(x,y))
      worldObjects.push({type:'runeStone',x,y});
  }
  // Torches along road intersections
  [[13,6],[14,6],[6,13],[6,14],[13,20],[14,20],[20,13],[20,14],
   [13,3],[14,3],[3,13],[3,14],[24,14],[24,13],[13,24],[14,24]].forEach(([x,y])=>{
    if(tileMap[y]&&tileMap[y][x]===TILE_DIRT&&!isOccupied(x,y))
      worldObjects.push({type:'torch',x,y});
  });
  // Lava vents — Zone 2
  [[4,18],[8,22],[3,24],[10,20],[6,17],[9,25]].forEach(([x,y])=>{
    if(tileMap[y]&&tileMap[y][x]===TILE_LAVA)worldObjects.push({type:'lavaVent',x,y});
  });
  // Zone signs (entry markers)
  worldObjects.push({type:'sign',x:13,y:1,label:'초보 구역'});
  worldObjects.push({type:'sign',x:14,y:1,label:'Lv.0~3'});
}

// ── ISOMETRIC COORDINATE TRANSFORMS ──────────────────────────
function tileToScreen(tx,ty,camX,camY){
  const sx = (tx-ty)*TW/2 - camX + canvas.width/2;
  const sy = (tx+ty)*TH/2 - camY + canvas.height/2 - heightMap[Math.min(MAPH-1,Math.max(0,ty))][Math.min(MAPW-1,Math.max(0,tx))]*8;
  return {x:sx,y:sy};
}

function screenToTile(sx,sy,camX,camY){
  const wx = sx - canvas.width/2 + camX;
  const wy = sy - canvas.height/2 + camY;
  const tx = Math.round((wx/(TW/2) + wy/(TH/2)) / 2);
  const ty = Math.round((wy/(TH/2) - wx/(TW/2)) / 2);
  return {x:Math.max(0,Math.min(MAPW-1,tx)), y:Math.max(0,Math.min(MAPH-1,ty))};
}

// ── TILE RENDERING ────────────────────────────────────────────
// Rich palette per tile type
const TPAL={
  [TILE_GRASS]:{top:'#3a6b2e',top2:'#4a8038',side:'#234018',side2:'#1a3012',edge:'rgba(130,210,70,.12)'},
  [TILE_DIRT]: {top:'#8a6535',top2:'#9e7840',side:'#5a3e1a',side2:'#3e2608',edge:'rgba(180,130,60,.08)'},
  [TILE_STONE]:{top:'#5a5a6a',top2:'#6e6e80',side:'#363645',side2:'#20202e',edge:'rgba(180,180,220,.1)'},
  [TILE_WATER]:{top:'#1a4080',top2:'#2050a8',side:'#0a1e50',side2:'#060c2a',edge:'rgba(80,160,255,.2)'},
  [TILE_DARK]: {top:'#1e0e30',top2:'#2a1240',side:'#100520',side2:'#080210',edge:'rgba(160,60,255,.12)'},
  [TILE_LAVA]: {top:'#8b1a00',top2:'#c23000',side:'#5a0800',side2:'#2a0200',edge:'rgba(255,100,0,.25)'},
  [TILE_SAND]: {top:'#c8a040',top2:'#dab850',side:'#7a5c10',side2:'#504008',edge:'rgba(255,220,80,.1)'},
  [TILE_SWAMP]:{top:'#2e4a1e',top2:'#3a5e24',side:'#162010',side2:'#0a1008',edge:'rgba(60,160,40,.1)'},
  [TILE_RUNE]: {top:'#1a0a2e',top2:'#26103e',side:'#0c0418',side2:'#06020c',edge:'rgba(200,100,255,.2)'},
};

// Animated lava tiles
let lavaAnim=0;

function drawTile(tx,ty,camX,camY){
  const {x,y}=tileToScreen(tx,ty,camX,camY);
  const t=tileMap[ty][tx];
  const p=TPAL[t]||TPAL[TILE_GRASS];
  const h=7;

  if(x<-TW||x>canvas.width+TW||y<-TH*2||y>canvas.height+TH*2) return;

  const cx=x+TW/2, cy=y; // tile center top

  // ── TOP FACE ──────────────────────────────────────────────────
  // Gradient top face
  const tgrad=ctx.createLinearGradient(x,y-TH/2,x+TW,y+TH/2);
  tgrad.addColorStop(0,p.top2); tgrad.addColorStop(1,p.top);
  ctx.fillStyle=tgrad;
  ctx.beginPath();
  ctx.moveTo(x,y); ctx.lineTo(cx,y+TH/2);
  ctx.lineTo(x+TW,y); ctx.lineTo(cx,y-TH/2);
  ctx.closePath(); ctx.fill();

  // ── PER-TILE TEXTURE ─────────────────────────────────────────
  if(t===TILE_GRASS){
    // Grass blades
    ctx.fillStyle='rgba(70,150,40,.22)';
    for(let i=0;i<5;i++){
      const gx=x+8+noise(tx*5+i,ty*3)*52,gy=y-2+noise(tx+i,ty*4)*14;
      ctx.fillRect(gx,gy,2,4);
    }
    // Darker patches
    ctx.fillStyle='rgba(20,80,10,.12)';
    for(let i=0;i<3;i++){
      const gx=x+10+noise(tx*3+i+10,ty*7)*44,gy=y+noise(tx*2,ty+i)*12;
      ctx.fillRect(gx,gy,8,3);
    }
  }
  if(t===TILE_DIRT){
    // Tire track / footprint texture
    ctx.fillStyle='rgba(60,30,5,.15)';
    for(let i=0;i<4;i++){
      const gx=x+6+noise(tx*4+i,ty*5)*52,gy=y-1+noise(ty*4+i,tx*3)*12;
      ctx.fillRect(gx,gy,4,2);
    }
    ctx.fillStyle='rgba(160,100,40,.1)';
    ctx.beginPath();ctx.arc(cx,cy,10,0,Math.PI*2);ctx.fill();
  }
  if(t===TILE_STONE){
    // Stone tile seams
    ctx.strokeStyle='rgba(0,0,0,.2)'; ctx.lineWidth=.7;
    ctx.beginPath();ctx.moveTo(x+TW*.25,y-TH*.05);ctx.lineTo(x+TW*.55,y+TH*.3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+TW*.65,y-TH*.1);ctx.lineTo(x+TW*.8,y+TH*.25);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.04)';
    ctx.fillRect(cx-8,y-4,16,3);
  }
  if(t===TILE_WATER){
    // Animated ripples
    const wt=lavaAnim*.06;
    ctx.fillStyle='rgba(80,160,255,.1)';
    for(let i=0;i<3;i++){
      const wx=cx-12+i*12,wy=cy+Math.sin(wt+i)*2;
      ctx.beginPath();ctx.ellipse(wx,wy,10-i*2,2,0,0,Math.PI*2);ctx.fill();
    }
    // Shimmer
    ctx.fillStyle='rgba(200,240,255,.12)';
    ctx.beginPath();ctx.ellipse(cx-4,cy-2+Math.sin(wt*.7)*2,14,4,.2,0,Math.PI*2);ctx.fill();
  }
  if(t===TILE_LAVA){
    // Animated lava flow
    const lt=lavaAnim*.04;
    const lgrad=ctx.createRadialGradient(cx+Math.sin(lt)*6,cy,0,cx,cy,TW*.5);
    lgrad.addColorStop(0,'rgba(255,200,50,.4)');
    lgrad.addColorStop(.5,'rgba(255,80,0,.2)');
    lgrad.addColorStop(1,'rgba(100,0,0,0)');
    ctx.fillStyle=lgrad;
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(cx,y+TH/2);ctx.lineTo(x+TW,y);ctx.lineTo(cx,y-TH/2);ctx.closePath();ctx.fill();
    // Cracks
    ctx.strokeStyle='rgba(255,180,0,.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx-8,cy-4+Math.sin(lt)*2);ctx.lineTo(cx+10,cy+6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+4,cy-8);ctx.lineTo(cx-6,cy+8+Math.cos(lt)*2);ctx.stroke();
  }
  if(t===TILE_SAND){
    // Sand ripples
    ctx.fillStyle='rgba(200,160,50,.12)';
    for(let i=0;i<4;i++){
      const sw=18-i*3;
      ctx.beginPath();ctx.ellipse(cx+noise(tx+i,ty)*10-5,cy+i*3-4,sw,2,.15,0,Math.PI*2);ctx.fill();
    }
    // Pebbles
    ctx.fillStyle='rgba(120,90,30,.2)';
    for(let i=0;i<3;i++){
      const px2=x+8+noise(tx*6+i,ty*2)*50,py2=y+noise(ty*6+i,tx*2)*12;
      ctx.beginPath();ctx.arc(px2,py2,2,0,Math.PI*2);ctx.fill();
    }
  }
  if(t===TILE_SWAMP){
    // Murky puddles
    ctx.fillStyle='rgba(20,60,10,.2)';
    for(let i=0;i<2;i++){
      const sx=cx-10+i*14,sy=cy+i*2;
      ctx.beginPath();ctx.ellipse(sx,sy,10-i*3,3,0,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle='rgba(80,150,20,.1)';ctx.beginPath();ctx.arc(cx,cy+2,8,0,Math.PI*2);ctx.fill();
  }
  if(t===TILE_DARK){
    // Shadow wisps
    ctx.fillStyle='rgba(100,0,200,.1)';
    ctx.beginPath();ctx.arc(cx+Math.sin(lavaAnim*.03)*4,cy+Math.cos(lavaAnim*.03)*2,10,0,Math.PI*2);ctx.fill();
  }
  if(t===TILE_RUNE){
    // Glowing rune symbol
    const ra=.4+Math.sin(lavaAnim*.05)*.3;
    ctx.fillStyle=`rgba(180,80,255,${ra*.15})`;
    ctx.beginPath();ctx.moveTo(cx,cy-8);ctx.lineTo(cx+6,cy+4);ctx.lineTo(cx-6,cy+4);ctx.closePath();ctx.fill();
    ctx.strokeStyle=`rgba(200,100,255,${ra*.4})`;ctx.lineWidth=.8;
    ctx.beginPath();ctx.arc(cx,cy,7,0,Math.PI*2);ctx.stroke();
  }

  // ── EDGE HIGHLIGHT (top-left edge) ────────────────────────────
  ctx.strokeStyle=p.edge; ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(cx,y-TH/2);ctx.lineTo(x+TW,y);ctx.stroke();

  // ── LEFT SIDE FACE ────────────────────────────────────────────
  const lg=ctx.createLinearGradient(x,y,x,y+h);
  lg.addColorStop(0,p.side); lg.addColorStop(1,p.side2);
  ctx.fillStyle=lg;
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+h);ctx.lineTo(cx,y+TH/2+h);ctx.lineTo(cx,y+TH/2);ctx.closePath();ctx.fill();

  // ── RIGHT SIDE FACE ───────────────────────────────────────────
  const rg=ctx.createLinearGradient(x+TW,y,cx,y+TH/2);
  rg.addColorStop(0,p.side2); rg.addColorStop(1,p.side);
  ctx.fillStyle=rg;
  ctx.beginPath();ctx.moveTo(x+TW,y);ctx.lineTo(x+TW,y+h);ctx.lineTo(cx,y+TH/2+h);ctx.lineTo(cx,y+TH/2);ctx.closePath();ctx.fill();

  // Lava glow on side faces
  if(t===TILE_LAVA){
    ctx.fillStyle=`rgba(255,80,0,${.15+Math.sin(lavaAnim*.05)*.05})`;
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+h);ctx.lineTo(cx,y+TH/2+h);ctx.lineTo(cx,y+TH/2);ctx.closePath();ctx.fill();
    ctx.fillStyle=`rgba(200,40,0,.1)`;
    ctx.beginPath();ctx.moveTo(x+TW,y);ctx.lineTo(x+TW,y+h);ctx.lineTo(cx,y+TH/2+h);ctx.lineTo(cx,y+TH/2);ctx.closePath();ctx.fill();
  }
}

function spawnMonster(data, tx, ty) {
  return {
    data,
    tx, ty,
    px:0, py:0,
    hp: data.hp,
    maxHp: data.hp,
    alive: true,
    animFrame: 0,
    wanderTimer: Math.random()*120,
    wanderDx:0, wanderDy:0,
    id: data.id + '_' + Math.random().toString(36).slice(2)

}

function initMonsters() {
  monsterInstances = [];
  const placements = [
    // Zone 0
    {m:0,tx:3,ty:4},{m:1,tx:6,ty:3},{m:2,tx:9,ty:6},{m:3,tx:5,ty:9},
    {m:0,tx:4,ty:7},{m:1,tx:8,ty:4},
    // Zone 1
    {m:4,tx:17,ty:3},{m:5,tx:20,ty:5},{m:6,tx:23,ty:8},{m:7,tx:18,ty:9},
    {m:5,tx:22,ty:3},{m:4,tx:19,ty:7},
    // Zone 2
    {m:8,tx:3,ty:17},{m:9,tx:6,ty:20},{m:10,tx:9,ty:22},{m:11,tx:5,ty:19},
    {m:8,tx:8,ty:17},{m:9,tx:3,ty:23},
    // Zone 3 (boss)
    {m:12,tx:20,ty:20},{m:10,tx:18,ty:22},{m:11,tx:23,ty:18},
  ];
  placements.forEach(p=>{
    const mdata = MONSTERS[p.m];
    let tx=p.tx, ty=p.ty;
    // Ensure walkable
    if(tileMap[ty]&&tileMap[ty][tx]!==TILE_STONE&&tileMap[ty][tx]!==TILE_WATER)
      monsterInstances.push(spawnMonster(mdata,tx,ty));
  });
}

// ── PATHFINDING (simple BFS) ──────────────────────────────────
function findPath(x1,y1,x2,y2){
  if(x1===x2&&y1===y2) return [];
  const visited = new Set();
  const queue = [{x:x1,y:y1,path:[]}];
  visited.add(y1*MAPW+x1);
  const dirs = [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1},{dx:1,dy:1},{dx:-1,dy:1},{dx:1,dy:-1},{dx:-1,dy:-1}];
  let iters=0;
  while(queue.length&&iters++<800){
    const {x,y,path}=queue.shift();
    for(const {dx,dy} of dirs){
      const nx=x+dx,ny=y+dy;
      if(nx<0||nx>=MAPW||ny<0||ny>=MAPH) continue;
      const key=ny*MAPW+nx;
      if(visited.has(key)) continue;
      if(tileMap[ny][nx]===TILE_STONE||tileMap[ny][nx]===TILE_WATER||tileMap[ny][nx]===TILE_LAVA) continue;
      // Check if monster occupies (ignore target)
      const blockedByMonster = monsterInstances.some(m=>m.alive&&m.tx===nx&&m.ty===ny&&!(nx===x2&&ny===y2));
      if(blockedByMonster) continue;
      const newPath=[...path,{x:nx,y:ny}];
      if(nx===x2&&ny===y2) return newPath;
      visited.add(key);
      queue.push({x:nx,y:ny,path:newPath});
    }
  }
  return [];
}

function drawPlayerSprite(sx,sy,frame,invincible){
  const bob = Math.sin(frame*.08)*2;
  const y=sy+bob;
  const fl = invincible>0 && Math.floor(frame*.5)%2===0;
  if(fl){ctx.globalAlpha=0.4;}

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(sx,sy+14,10,4,0,0,Math.PI*2); ctx.fill();

  // Robe
  ctx.fillStyle='#1a237e';
  ctx.fillRect(sx-7,y-2,14,16);
  ctx.fillStyle='#283593';
  ctx.fillRect(sx-9,y+4,18,12);
  // Highlight
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.fillRect(sx-6,y-1,4,8);

  // Head
  ctx.fillStyle='#ffccbc'; ctx.beginPath(); ctx.arc(sx,y-8,7,0,Math.PI*2); ctx.fill();

  // Hat
  ctx.fillStyle='#311b92';
  ctx.beginPath(); ctx.moveTo(sx-8,y-10); ctx.lineTo(sx,y-24); ctx.lineTo(sx+8,y-10); ctx.closePath(); ctx.fill();

  // Eyes
  ctx.fillStyle='#1a237e';
  ctx.fillRect(sx-4,y-9,3,2); ctx.fillRect(sx+1,y-9,3,2);

  // Staff
  ctx.strokeStyle='#8d6e63'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(sx+8,y-20); ctx.lineTo(sx+10,y+14); ctx.stroke();
  ctx.shadowBlur=6; ctx.shadowColor='#00e5ff';
  ctx.fillStyle='#00e5ff';
  ctx.beginPath(); ctx.arc(sx+9,y-22,4,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  ctx.globalAlpha=1;
}

function drawMonsterSprite(sx,sy,frame,data,hitFlash,selected){
  const bob = Math.sin(frame*.07+data.id)*3;
  const y = sy+bob;

  // Selection ring
  if(selected){
    ctx.strokeStyle='rgba(255,215,64,0.8)'; ctx.lineWidth=2;
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.ellipse(sx,sy+12,18,7,0,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(sx,sy+14,12,4,0,0,Math.PI*2); ctx.fill();

  // Hit flash
  if(hitFlash>0){ ctx.globalAlpha=0.5; }

  // Glow
  ctx.shadowBlur=15; ctx.shadowColor=data.glowColor||'rgba(255,100,50,.4)';

  // Draw based on sprite type
  const s=data.sprite;
  if(s==='goblin') _drawGoblin(sx,y,frame,data.color,hitFlash);
  else if(s==='slime') _drawSlime(sx,y,frame,hitFlash);
  else if(s==='devil') _drawDevil(sx,y,frame,hitFlash);
  else if(s==='ghost') _drawGhost(sx,y,frame,hitFlash);
  else if(s==='shadow') _drawShadow(sx,y,frame,hitFlash);
  else if(s==='mimic') _drawMimic(sx,y,frame,hitFlash);
  else if(s==='golem') _drawGolem(sx,y,frame,hitFlash);
  else if(s==='wizard') _drawWizardBoss(sx,y,frame,hitFlash);
  else if(s==='ogre') _drawOgre(sx,y,frame,hitFlash);
  else if(s==='dragon') _drawDragon(sx,y,frame,hitFlash);
  else if(s==='phoenix') _drawPhoenix(sx,y,frame,hitFlash);
  else if(s==='rotator') _drawRotator(sx,y,frame,hitFlash);
  else if(s==='lich') _drawLich(sx,y,frame,hitFlash);

  ctx.shadowBlur=0;
  ctx.globalAlpha=1;

  // HP bar above monster
  const bw=36, bh=5;
  const bx=sx-bw/2, by=y-38;
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(bx-1,by-1,bw+2,bh+2);
  ctx.fillStyle='#880e4f';
  ctx.fillRect(bx,by,bw,bh);
  // We need monster hp from instance... passed via frame trick - just show full red for now
}

  ctx.shadowBlur=10; ctx.shadowColor='#00bcd4';

  ctx.shadowBlur=0;
}

class Particle {
  constructor(x,y,vx,vy,color,life,size){
    Object.assign(this,{x,y,vx,vy,color,life,maxLife:life,size:size||3});
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=.12;this.life--;}
  draw(){
    ctx.globalAlpha=this.life/this.maxLife;
    ctx.fillStyle=this.color;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.size*(this.life/this.maxLife),0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
}

class FloatingText {
  constructor(x,y,text,color){
    Object.assign(this,{x,y,text,color,life:60,vy:-1.2});
  }
  update(){this.y+=this.vy;this.life--;this.vy*=.96;}
  draw(){
    const a=this.life/60;
    ctx.globalAlpha=a;
    ctx.fillStyle=this.color;
    ctx.font='bold 14px "Share Tech Mono",monospace';
    ctx.textAlign='center';
    ctx.fillText(this.text,this.x,this.y);
    ctx.textAlign='left';
    ctx.globalAlpha=1;
  }
}

function drawWorldObject(obj,sx,sy,tick){
  const t=tick;
  ctx.save();
  switch(obj.type){

    case 'tree':{
      const bob=Math.sin(t*.015+obj.x*1.3)*.8;
      const v=obj.v||0;
      const trunkH=[16,14,18][v];
      const colors=[['#2e7d32','#388e3c','#1b5e20'],['#388e3c','#43a047','#1b5e20'],['#1b5e20','#2e7d32','#0a3d0a']];
      const [c0,c1,c2]=colors[v];
      // Shadow
      ctx.fillStyle='rgba(0,0,0,.25)';
      ctx.beginPath();ctx.ellipse(sx,sy+8,14,4,0,0,Math.PI*2);ctx.fill();
      // Trunk
      ctx.fillStyle='#4e342e';ctx.fillRect(sx-3,sy-trunkH+8,6,trunkH);
      // Foliage layers (back to front)
      ctx.shadowBlur=6;ctx.shadowColor='rgba(30,100,20,.4)';
      ctx.fillStyle=c2;ctx.beginPath();ctx.arc(sx,sy-trunkH-4+bob,13,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=c0;ctx.beginPath();ctx.arc(sx-4,sy-trunkH-10+bob,10,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(sx+4,sy-trunkH-10+bob,10,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=c1;ctx.beginPath();ctx.arc(sx,sy-trunkH-16+bob,8,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      // Highlight
      ctx.fillStyle='rgba(150,230,80,.12)';
      ctx.beginPath();ctx.arc(sx-4,sy-trunkH-17+bob,5,0,Math.PI*2);ctx.fill();
      break;
    }

    case 'rock':{
      const v=obj.v||0;
      const scales=[[1,1],[1.3,.9],[.8,1.2]][v];
      ctx.fillStyle='rgba(0,0,0,.2)';
      ctx.beginPath();ctx.ellipse(sx,sy+4,14*scales[0],4,0,0,Math.PI*2);ctx.fill();
      const rg=ctx.createLinearGradient(sx-12,sy-14,sx+12,sy+4);
      rg.addColorStop(0,'#8090a0');rg.addColorStop(1,'#4a5060');
      ctx.fillStyle=rg;
      ctx.beginPath();ctx.ellipse(sx-2,sy-8,12*scales[0],9*scales[1],.15,0,Math.PI*2);ctx.fill();
      // highlight
      ctx.fillStyle='rgba(255,255,255,.15)';
      ctx.beginPath();ctx.ellipse(sx-5,sy-12,5,3,-.4,0,Math.PI*2);ctx.fill();
      // crack
      ctx.strokeStyle='rgba(0,0,0,.22)';ctx.lineWidth=.8;
      ctx.beginPath();ctx.moveTo(sx+2,sy-14);ctx.lineTo(sx+6,sy-5);ctx.stroke();
      break;
    }

    case 'deadtree':{
      const sway=Math.sin(t*.02+obj.x)*1.5;
      ctx.fillStyle='rgba(0,0,0,.2)';
      ctx.beginPath();ctx.ellipse(sx,sy+6,8,3,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#3e2723';ctx.lineWidth=4;
      ctx.beginPath();ctx.moveTo(sx,sy+4);ctx.lineTo(sx+sway,sy-20);ctx.stroke();
      // Bare branches
      ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(sx+sway,sy-16);ctx.lineTo(sx+sway+10,sy-24);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx+sway,sy-20);ctx.lineTo(sx+sway-8,sy-28);ctx.stroke();
      ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(sx+sway+10,sy-24);ctx.lineTo(sx+sway+15,sy-30);ctx.stroke();
      // Eerie glow
      ctx.fillStyle='rgba(180,50,0,.06)';
      ctx.beginPath();ctx.arc(sx+sway,sy-20,14,0,Math.PI*2);ctx.fill();
      break;
    }

    case 'torch':{
      const flicker=Math.sin(t*.14+obj.x*2.1)*.3+.7;
      const flicker2=Math.cos(t*.19+obj.y*1.7)*.2+.8;
      // Post shadow
      ctx.fillStyle='rgba(0,0,0,.3)';
      ctx.beginPath();ctx.ellipse(sx,sy+8,5,2,0,0,Math.PI*2);ctx.fill();
      // Post
      ctx.fillStyle='#5d4037';ctx.fillRect(sx-2,sy-4,4,14);
      ctx.fillStyle='#4e342e';ctx.fillRect(sx-3,sy-6,6,5);
      // Glow halo on ground
      const haloG=ctx.createRadialGradient(sx,sy+4,0,sx,sy+4,22);
      haloG.addColorStop(0,`rgba(255,140,0,${flicker*.12})`);
      haloG.addColorStop(1,'rgba(255,80,0,0)');
      ctx.fillStyle=haloG;ctx.beginPath();ctx.arc(sx,sy+4,22,0,Math.PI*2);ctx.fill();
      // Flame glow
      ctx.shadowBlur=20*flicker;ctx.shadowColor=`rgba(255,160,0,${flicker})`;
      const fg=ctx.createRadialGradient(sx,sy-8,0,sx,sy-8,10*flicker2);
      fg.addColorStop(0,`rgba(255,255,200,${flicker})`);
      fg.addColorStop(.4,`rgba(255,140,0,${flicker*.8})`);
      fg.addColorStop(1,'rgba(200,60,0,0)');
      ctx.fillStyle=fg;
      const fw=4+flicker*2;
      ctx.beginPath();ctx.ellipse(sx,sy-9,fw*.7,fw*1.3,0,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      // Ember particles
      if(Math.random()>.75)
        particles.push(new Particle(sx+(Math.random()-.5)*4,sy-10,
          (Math.random()-.5)*.4,-1.2-(Math.random()*.5),
          Math.random()>.5?'#ffcc80':'#ff8f00',18,1.2));
      break;
    }

    case 'lavaVent':{
      const pulse=Math.sin(t*.08+obj.x)*0.5+0.5;
      // Vent base
      ctx.fillStyle='#3e0000';ctx.beginPath();ctx.ellipse(sx,sy+6,16,5,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#6d0000';ctx.beginPath();ctx.ellipse(sx,sy+4,12,4,0,0,Math.PI*2);ctx.fill();
      // Lava glow
      ctx.shadowBlur=18*(pulse+.4);ctx.shadowColor='#ff3d00';
      const vg=ctx.createRadialGradient(sx,sy+2,0,sx,sy+2,14);
      vg.addColorStop(0,`rgba(255,200,0,${.6+pulse*.3})`);
      vg.addColorStop(.4,`rgba(255,80,0,${.4+pulse*.2})`);
      vg.addColorStop(1,'rgba(100,0,0,0)');
      ctx.fillStyle=vg;ctx.beginPath();ctx.arc(sx,sy+2,14,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      // Eruption burst
      if(pulse>.9&&Math.random()>.6){
        for(let i=0;i<4;i++)
          particles.push(new Particle(sx+(Math.random()-.5)*8,sy+2,
            (Math.random()-.5)*2.5,-2.5-Math.random()*2,
            Math.random()>.5?'#ff6d00':'#ffd740',25,2));
      }
      break;
    }

    case 'skull':{
      ctx.fillStyle='rgba(0,0,0,.2)';
      ctx.beginPath();ctx.ellipse(sx,sy+6,10,3,0,0,Math.PI*2);ctx.fill();
      // Skull pile
      ctx.fillStyle='#cfd8dc';
      ctx.beginPath();ctx.arc(sx-4,sy+2,5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(sx+4,sy-1,6,0,Math.PI*2);ctx.fill();
      // Jaw
      ctx.fillStyle='#b0bec5';ctx.fillRect(sx,sy+2,8,4);
      // Eye sockets (dark zone glow)
      ctx.fillStyle='rgba(180,80,255,.6)';
      ctx.beginPath();ctx.arc(sx+2,sy-2,2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(sx+6,sy-2,2,0,Math.PI*2);ctx.fill();
      // Eerie mist
      ctx.fillStyle='rgba(100,0,160,.07)';
      ctx.beginPath();ctx.arc(sx+4,sy,12,0,Math.PI*2);ctx.fill();
      break;
    }

    case 'runeStone':{
      const glow=.5+Math.sin(t*.05+obj.x*.8)*.3;
      ctx.fillStyle='rgba(0,0,0,.3)';
      ctx.beginPath();ctx.ellipse(sx,sy+8,10,3,0,0,Math.PI*2);ctx.fill();
      // Stone slab
      const rsg=ctx.createLinearGradient(sx-8,sy-18,sx+8,sy+8);
      rsg.addColorStop(0,'#37474f');rsg.addColorStop(1,'#263238');
      ctx.fillStyle=rsg;ctx.fillRect(sx-8,sy-18,16,26);
      // Engraved rune glow
      ctx.shadowBlur=12*glow;ctx.shadowColor='#7c4dff';
      ctx.strokeStyle=`rgba(180,100,255,${glow})`;ctx.lineWidth=1.2;
      // Rune symbol (∆ + circle)
      ctx.beginPath();ctx.moveTo(sx,sy-14);ctx.lineTo(sx-5,sy-4);ctx.lineTo(sx+5,sy-4);ctx.closePath();ctx.stroke();
      ctx.beginPath();ctx.arc(sx,sy-9,6,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;
      // Top capstone
      ctx.fillStyle='#455a64';ctx.fillRect(sx-9,sy-20,18,4);
      break;
    }
  }
  ctx.restore();
}

function getPlayerZone(){
  const px=Math.round(player.tx), py=Math.round(player.ty);
  if(px<14&&py<14) return 0;
  if(px>=14&&py<14) return 1;
  if(px<14&&py>=14) return 2;
  return 3;
}

// ═══════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════
let lastFrameTime = 0;

function render(timestamp){
  const dt = timestamp - lastFrameTime;
  lastFrameTime = timestamp;
  currentTick++;

  // Update camera smoothly
  camX += (camTargetX-camX)*.12;
  camY += (camTargetY-camY)*.12;

  lavaAnim++;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // ── Zone-tinted sky background ────────────────────────────────
  const pz = getPlayerZone();
  const skyPalette=[
    ['#04080e','#08101c'],  // zone 0: dark forest night
    ['#080a06','#141808'],  // zone 1: dusty desert night
    ['#0e0604','#1c0a04'],  // zone 2: lava glow
    ['#060008','#0e0016'],  // zone 3: void darkness
  ];
  const [sky0,sky1]=skyPalette[pz]||skyPalette[0];
  const skyGrad=ctx.createLinearGradient(0,0,0,canvas.height);
  skyGrad.addColorStop(0,sky0); skyGrad.addColorStop(1,sky1);
  ctx.fillStyle=skyGrad; ctx.fillRect(0,0,canvas.width,canvas.height);

  // Distant fog/atmosphere overlay
  const fogColors=['rgba(0,40,20,.06)','rgba(40,30,0,.07)','rgba(80,20,0,.09)','rgba(40,0,60,.1)'];
  ctx.fillStyle=fogColors[pz]||fogColors[0];
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // ── ISO depth-sorted render ────────────────────────────────────
  for(let depth=0;depth<MAPW+MAPH-1;depth++){

    // 1. Draw tiles
    for(let ty=0;ty<=depth;ty++){
      const tx=depth-ty;
      if(tx>=0&&tx<MAPW&&ty>=0&&ty<MAPH) drawTile(tx,ty,camX,camY);
    }

    // 2. Draw world objects + entities at this depth
    for(let ty2=0;ty2<=depth;ty2++){
      const tx2=depth-ty2;
      if(tx2<0||tx2>=MAPW||ty2<0||ty2>=MAPH) continue;

      // World objects (trees, rocks, torches…)
      worldObjects.forEach(obj=>{
        if(obj.x!==tx2||obj.y!==ty2) return;
        const {x,y}=tileToScreen(obj.x,obj.y,camX,camY);
        const sx=x+TW/2, sy=y-TH/4;
        drawWorldObject(obj,sx,sy,currentTick);
      });

      // Monsters
      monsterInstances.forEach(m=>{
        if(!m.alive) return;
        const mx=Math.round(m.tx), my=Math.round(m.ty);
        if(mx!==tx2||my!==ty2) return;
        const {x,y}=tileToScreen(m.tx,m.ty,camX,camY);
        m.animFrame++;

        // Wander
        m.wanderTimer--;
        if(m.wanderTimer<=0){
          m.wanderTimer=60+Math.random()*120;
          if(!player.inBattle){
            const dirs=[{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1},{dx:0,dy:0}];
            const d=dirs[Math.floor(Math.random()*dirs.length)];
            const nx=m.tx+d.dx, ny=m.ty+d.dy;
            if(nx>=0&&nx<MAPW&&ny>=0&&ny<MAPH&&tileMap[ny][nx]!==TILE_STONE&&tileMap[ny][nx]!==TILE_WATER&&tileMap[ny][nx]!==TILE_LAVA){
              const occ=monsterInstances.some(o=>o!==m&&o.alive&&Math.round(o.tx)===nx&&Math.round(o.ty)===ny);
              if(!occ){ m.tx=nx; m.ty=ny; }
            }
          }
        }

        const isSel=activeMonster&&activeMonster.id===m.id;
        drawMonsterSprite(x+TW/2,y-TH/4,m.animFrame,m.data,m.hitFlash||0,isSel);
        if(m.hitFlash>0) m.hitFlash--;

        // HP bar (styled)
        const bw=44,bh=5,bx=x+TW/2-bw/2,by=y-TH/4-50;
        const hpRatio=m.hp/m.maxHp;
        const hpClr=hpRatio>.6?'#00c853':hpRatio>.3?'#ffd740':'#ff1744';
        ctx.fillStyle='rgba(0,0,0,.75)'; ctx.fillRect(bx-1,by-1,bw+2,bh+2);
        ctx.fillStyle='#1a1a2e'; ctx.fillRect(bx,by,bw,bh);
        ctx.fillStyle=hpClr; ctx.fillRect(bx,by,bw*hpRatio,bh);
        ctx.fillStyle='rgba(255,255,255,.07)'; ctx.fillRect(bx,by,bw,bh);
      });

      // Player
      const px2=Math.round(player.tx), py2=Math.round(player.ty);
      if(px2===tx2&&py2===ty2){
        updatePlayer();
        const {x,y}=tileToScreen(player.tx,player.ty,camX,camY);
        drawPlayerSprite(x+TW/2,y-TH/4,player.animFrame,player.invincible);
        player.animFrame++;
        camTargetX=(player.tx-player.ty)*TW/2;
        camTargetY=(player.tx+player.ty)*TH/2-canvas.height/2+80;
      }
    }
  }

  // Draw particles & floating texts
  particles.forEach(p=>{p.update();p.draw();});
  particles=particles.filter(p=>p.life>0);
  floatingTexts.forEach(f=>{f.update();f.draw();});
  floatingTexts=floatingTexts.filter(f=>f.life>0);

  // Zone labels
  drawZoneLabels();

  // Check monster regen
  checkRegen();

  // Minimap
  drawMinimap();

  requestAnimationFrame(render);
}

  const zones=[
    {tx:4, ty:4, label:"🌲 숲 구역",sub:"Lv.0-3 · 초보",color:"rgba(80,200,80,.85)"},
    {tx:19,ty:4, label:"🏜 황야 구역",sub:"Lv.4-7 · 중급",color:"rgba(220,180,60,.85)"},
    {tx:4, ty:19,label:"🌋 용암 구역",sub:"Lv.8-11 · 위험",color:"rgba(255,100,40,.85)"},
    {tx:19,ty:19,label:"💀 암흑 구역",sub:"Lv.12 · 보스",color:"rgba(180,80,255,.85)"},
  ];
  zones.forEach(z=>{
    const {x,y}=tileToScreen(z.tx,z.ty,camX,camY);
    if(x<-120||x>canvas.width+120||y<-60||y>canvas.height+60) return;
    const cx=x+TW/2;
    // Background pill
    ctx.fillStyle='rgba(0,0,0,.45)';
    ctx.beginPath();ctx.roundRect(cx-58,y-TH*2-4,116,34,6);ctx.fill();
    // Main label
    ctx.font='bold 10px "Press Start 2P",monospace';
    ctx.textAlign='center';
    ctx.shadowBlur=8;ctx.shadowColor=z.color;
    ctx.fillStyle=z.color;
    ctx.fillText(z.label,cx,y-TH*1.4);
    // Sub label
    ctx.shadowBlur=4;
    ctx.font='7px "Press Start 2P",monospace';
    ctx.fillStyle='rgba(255,255,255,.5)';
    ctx.fillText(z.sub,cx,y-TH*.7);
    ctx.shadowBlur=0;ctx.textAlign='left';
  });
}

function drawMinimap(){
  const mw=mm.width, mh=mm.height;
  mmCtx.fillStyle='#02040a'; mmCtx.fillRect(0,0,mw,mh);
  const tw=mw/MAPW, th=mh/MAPH;
  const mmColors={
    [TILE_GRASS]:'#2a4820',  [TILE_DIRT]:'#5a3e1a',
    [TILE_STONE]:'#3a3a4a',  [TILE_WATER]:'#0a2a60',
    [TILE_DARK]:'#120820',   [TILE_LAVA]:'#6a0000',
    [TILE_SAND]:'#7a6020',   [TILE_SWAMP]:'#1a3010',
    [TILE_RUNE]:'#280040',
  };
  for(let ty=0;ty<MAPH;ty++) for(let tx=0;tx<MAPW;tx++){
    mmCtx.fillStyle=mmColors[tileMap[ty][tx]]||'#111';
    mmCtx.fillRect(tx*tw,ty*th,tw+.5,th+.5);
  }
  // Zone boundary lines
  mmCtx.strokeStyle='rgba(255,255,255,.08)';mmCtx.lineWidth=.5;
  mmCtx.beginPath();mmCtx.moveTo(mw*.5,0);mmCtx.lineTo(mw*.5,mh);mmCtx.stroke();
  mmCtx.beginPath();mmCtx.moveTo(0,mh*.5);mmCtx.lineTo(mw,mh*.5);mmCtx.stroke();
  // Torches on minimap
  worldObjects.filter(o=>o.type==='torch').forEach(o=>{
    mmCtx.fillStyle='#ff8f00';mmCtx.fillRect(o.x*tw,o.y*th,2,2);
  });
  // Monsters
  monsterInstances.forEach(m=>{
    if(!m.alive) return;
    mmCtx.fillStyle=m.data.color||'#f44336';
    mmCtx.fillRect(m.tx*tw-1,m.ty*th-1,3,3);
  });
    // just dim
  });
  // Player
  mmCtx.fillStyle='#00e5ff';
  mmCtx.shadowBlur=4; mmCtx.shadowColor='#00e5ff';
  mmCtx.fillRect(player.tx*tw-2,player.ty*th-2,5,5);
  mmCtx.shadowBlur=0;
  // View box
  const vx=camX/TW*tw+mw/2, vy=(camY+canvas.height/2)/(TH/2)*th/2;
  mmCtx.strokeStyle='rgba(0,229,255,.4)'; mmCtx.lineWidth=1;
  mmCtx.strokeRect(
    Math.max(0,player.tx*tw-mw*.25), Math.max(0,player.ty*th-mh*.25),
    mw*.5, mh*.5
  );
}

// ═══════════════════════════════════════════════════════════════
// PLAYER UPDATE
// ═══════════════════════════════════════════════════════════════
function updatePlayer(){
  if(player.moving){
    player.moveProgress+=0.15;
    if(player.moveProgress>=1){
      player.tx=player.targetTx;
      player.ty=player.targetTy;
      player.moveProgress=0;
      player.moving=false;
      // Step to next path
      if(player.path.length>0){
        const next=player.path.shift();
        startMoveTo(next.x,next.y);
      }
    } else {
      // Smooth interpolation
      const startPos=tileToScreen(player.tx,player.ty,0,0);
      const endPos=tileToScreen(player.targetTx,player.targetTy,0,0);
      // Actual tile pos is interpolated
      const e=player.moveProgress;
      player.tx=player.tx+(player.targetTx-player.tx)*e*0.15;
      player.ty=player.ty+(player.targetTy-player.ty)*e*0.15;
    }
  }

  // Keyboard movement
  if(!player.inBattle&&!player.moving){
    let dx=0,dy=0;
    if(keys['ArrowUp']||keys['w']||keys['W']){dy=-1;}
    if(keys['ArrowDown']||keys['s']||keys['S']){dy=1;}
    if(keys['ArrowLeft']||keys['a']||keys['A']){dx=-1;}
    if(keys['ArrowRight']||keys['d']||keys['D']){dx=1;}
    if(dx||dy){
      const nx=Math.round(player.tx)+dx, ny=Math.round(player.ty)+dy;
      if(nx>=0&&nx<MAPW&&ny>=0&&ny<MAPH&&tileMap[ny][nx]!==TILE_STONE&&tileMap[ny][nx]!==TILE_WATER&&tileMap[ny][nx]!==TILE_LAVA){
        const occ=monsterInstances.find(m=>m.alive&&Math.round(m.tx)===nx&&Math.round(m.ty)===ny);
        if(occ) initiateEncounter(occ);
        else startMoveTo(nx,ny);
      }
    }
  }

  if(player.invincible>0) player.invincible--;
}

function startMoveTo(tx,ty){
  player.targetTx=tx; player.targetTy=ty;
  player.moving=true; player.moveProgress=0;
  player.tx=Math.round(player.tx); player.ty=Math.round(player.ty);
}

// ═══════════════════════════════════════════════════════════════
// ENCOUNTER SYSTEM
// ═══════════════════════════════════════════════════════════════
function initiateEncounter(monster){
  if(player.inBattle) return;
  player.inBattle=true;
  activeMonster=monster;
  player.path=[];
  player.moving=false;
  player.tx=Math.round(player.tx); player.ty=Math.round(player.ty);

  document.getElementById('encounterBox').classList.add('show');
  document.getElementById('encMonsterSprite').textContent=monster.data.emoji;
  document.getElementById('encMonsterName').textContent=monster.data.name;
  document.getElementById('encMonsterDesc').textContent=monster.data.desc;
  document.getElementById('encHpFill').style.width='100%';
  document.getElementById('termInput').disabled=false;
  document.getElementById('termInput').focus();
  document.getElementById('termPrompt').textContent='bandit'+monster.data.id+'@linux:~$';

  setDialogue(monster.data.name, monster.data.talk);
  addLog('--- '+monster.data.name+' 전투 시작! ---','info');
  addLog('명령어로 몬스터를 처치하세요!','sys');

  // Show hint based on difficulty
  updateHintDisplay(monster.data);

  // Encounter particles
  const {x,y}=tileToScreen(monster.tx,monster.ty,camX,camY);
  const ex=x+TW/2, ey=y-TH/4;
  for(let i=0;i<12;i++) particles.push(new Particle(
    ex+Math.random()*20-10, ey+Math.random()*20-20,
    (Math.random()-.5)*4, -Math.random()*4, '#ffd740', 40, 3
  ));
}

function updateHintDisplay(mdata){
  const sk=document.getElementById('skillReveal');
  const ans=document.getElementById('skAnswer');
  const diff=difficulty;

  let showAnswer=false;
  if(diff==='normal') showAnswer=true;
  else if(diff==='hard') showAnswer=mdata.tier>=3; // 고급 명령어(tier 3+)만 힌트 표시, 초보는 직접 해결
  else showAnswer=false; // hell: never

  if(showAnswer){
    sk.classList.add('show');
    ans.textContent='💡 '+mdata.hint_w+' (클릭하여 입력)';
    document.getElementById('skillReveal').querySelector('.sk-title').textContent=
      diff==='normal'?'💡 답 (NORMAL MODE)':'💡 고급 힌트 (HARD MODE)';
  } else {
    sk.classList.remove('show');
    if(diff==='hard') addLog('> [HARD] 초보 명령어 — 스스로 해결!','info');
    else addLog('> [HELL] 모든 답이 숨겨져 있습니다!','tl-err');
  }
}

function useHint(){
  const m=activeMonster;
  if(!m) return;
  document.getElementById('termInput').value=m.data.hint_w;
  document.getElementById('termInput').focus();
}

function endBattle(){
  player.inBattle=false;
  activeMonster=null;
  document.getElementById('encounterBox').classList.remove('show');
  document.getElementById('skillReveal').classList.remove('show');
  document.getElementById('termInput').disabled=true;
  document.getElementById('termInput').value='';
}

// ═══════════════════════════════════════════════════════════════
// COMBAT (command system)
// ═══════════════════════════════════════════════════════════════
function handleCommand(){
  const input=document.getElementById('termInput');
  const raw=input.value.trim(); if(!raw||!activeMonster) return;
  input.value='';
  const m=activeMonster;
  addLog('$ '+raw,'sys');

  const norm=s=>s.replace(/\s+/g,' ').trim().toLowerCase();
  const r=norm(raw);

  const isHit=m.data.cmds.some(c=>{
    const cn=norm(c);
    if(r===cn) return true;
    const words=cn.split(' ').filter(w=>w.length>2);
    return words.length>0&&words.filter(w=>r.includes(w)).length>=Math.ceil(words.length*.6);
  });

  if(isHit){
    const tier=m.data.tier||1;
    const dmg=Math.floor(m.data.hp*.6+Math.random()*m.data.hp*.4);
    m.hp=Math.max(0,m.hp-dmg);
    m.hitFlash=12;

    const {x,y}=tileToScreen(m.tx,m.ty,camX,camY);
    const ex=x+TW/2, ey=y-TH/4-20;

    // Spawn effect particles by tier
    const colors=[['#ffd740','#fff'],['#ff6d00','#ffd740'],['#00e5ff','#e040fb'],
                  ['#7c4dff','#e040fb','#fff'],['#7c4dff','#e040fb','#ff0000','#fff']];
    const clr=colors[Math.min(tier-1,4)];
    const count=8+tier*6;
    for(let i=0;i<count;i++) particles.push(new Particle(
      ex+Math.random()*50-25,ey+Math.random()*50-25,
      (Math.random()-.5)*(3+tier*1.5),(Math.random()-.5)*4-2,
      clr[Math.floor(Math.random()*clr.length)],35+tier*8,3+Math.random()*3
    ));

    floatingTexts.push(new FloatingText(ex,ey-10,`-${dmg}!`,'#ff5252'));
    const skillNames=['⭐ 스파클!','🔥 파이어볼!','⚡ 번개마법!','💀 마법진+빔!','💥 궁극기!!'];
    showBanner(true,skillNames[tier-1]||'마법 발동!');
    addLog(`✨ 명령어 성공! 데미지: ${dmg}`,'ok');
    addLog(`> Password: ${m.data.flag}`,'flag');
    document.getElementById('encHpFill').style.width=(m.hp/m.maxHp*100)+'%';

    if(m.hp<=0){
      setTimeout(()=>defeatMonster(m),500);
    } else {
      addLog('> HP가 남아있습니다 - 다시 공격!','info');
    }
  } else {
    // FAIL
    const {x,y}=tileToScreen(player.tx,player.ty,camX,camY);
    const px2=x+TW/2, py2=y-TH/4-20;
    particles.push(new Particle(px2,py2,0,-2,'#ff1744',30,8));
    for(let i=0;i<5;i++) particles.push(new Particle(
      px2+Math.random()*20-10,py2+Math.random()*10,
      (Math.random()-.5)*2,-Math.random()*2,'#ff5252',20,2
    ));
    floatingTexts.push(new FloatingText(px2,py2-10,'MISS!','#ff1744'));
    player.hp=Math.max(1,player.hp-5);
    player.invincible=30;
    updateHUD();
    showBanner(false,'❌ 스킬 획득 실패! 명령어를 확인하세요.');

    const commons=['ls','cd','cat','find','grep','sort','file','chmod','man','less','more','strings','base64','tr','xxd','gzip','tar','ssh'];
    const isCommon=commons.some(c=>norm(raw).startsWith(c));
    addLog(isCommon?'> 방향은 맞지만 이 몬스터의 약점이 아닙니다':'> bash: '+raw+': command not found','err');
  }
}

function defeatMonster(m){
  m.alive=false;
  const id=m.id;
  defeatedMonsters[id]=currentTick;

  const xp=m.data.xp;
  player.xp+=xp;

  // Level up?
  if(player.xp>=100*player.level){
    player.xp-=100*player.level;
    player.level++;
    player.maxHp+=15; player.hp=Math.min(player.hp+30,player.maxHp);
    const {x,y}=tileToScreen(player.tx,player.ty,camX,camY);
    floatingTexts.push(new FloatingText(x+TW/2,y-60,'LEVEL UP!','#ffd740'));
    document.getElementById('lvlBadge').textContent=`LV.${player.level} `+getLevelTitle(player.level);
  }

  updateHUD();
  endBattle();

  // Explosion
  const {x,y}=tileToScreen(m.tx,m.ty,camX,camY);
  const ex=x+TW/2,ey=y-TH/4;
  for(let i=0;i<30;i++) particles.push(new Particle(
    ex+Math.random()*60-30,ey+Math.random()*60-30,
    (Math.random()-.5)*7,(Math.random()-.5)*7-3,
    ['#ffd740','#ff6d00','#fff','#00e5ff'][Math.floor(Math.random()*4)],50+Math.random()*30,4+Math.random()*4
  ));
  floatingTexts.push(new FloatingText(ex,ey-30,`+${xp} XP`,'#ffd740'));

  // Victory overlay
  document.getElementById('ovTitle').textContent='🏆 VICTORY!';
  document.getElementById('ovTitle').style.color='#00e676';
  document.getElementById('ovMonster').textContent=m.data.name+' 처치! +'+xp+' XP';
  document.getElementById('ovFlag').textContent='🔑 다음 레벨 비밀번호:\n'+m.data.flag;
  document.getElementById('ovHint').textContent=m.data.nextHint;
  document.getElementById('overlay').classList.add('show');
}

function checkRegen(){
  monsterInstances.forEach(m=>{
    if(!m.alive){
      if(!m.regenScheduled){
        m.regenScheduled=true;
        m.regenAt=currentTick+REGEN_TICKS;
      }
      if(currentTick>=m.regenAt){
        m.alive=true;
        m.hp=m.maxHp;
        m.regenScheduled=false;
        // Regen particle
        const {x,y}=tileToScreen(m.tx,m.ty,camX,camY);
        for(let i=0;i<8;i++) particles.push(new Particle(
          x+TW/2+Math.random()*20-10,y-TH/4+Math.random()*20-10,
          (Math.random()-.5)*2,-Math.random()*3,'#00e676',30,2
        ));
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════
function setDialogue(speaker,text){
  document.getElementById('dlgSpeaker').textContent=speaker;
  document.getElementById('dlgText').innerHTML=text.replace(/\n/g,'<br>')+'<span class="dlg-cur"></span>';
}

function addLog(text,type){
  const log=document.getElementById('termLog');
  const d=document.createElement('div');
  d.className='tl-'+type; d.textContent=text;
  log.appendChild(d); log.scrollTop=log.scrollHeight;
}

function showBanner(success,text){
  const b=document.getElementById('banner');
  b.className='banner show '+(success?'s':'f');
  b.textContent=text;
  clearTimeout(b._t);
  b._t=setTimeout(()=>b.classList.remove('show'),2200);
}

function updateHUD(){
  document.getElementById('pHpBar').style.width=(player.hp/player.maxHp*100)+'%';
  document.getElementById('pHpVal').textContent=player.hp+'/'+player.maxHp;
  document.getElementById('pXpBar').style.width=(player.xp/(100*player.level)*100)+'%';
  document.getElementById('pXpVal').textContent=player.xp+'/'+(100*player.level);
}

function getLevelTitle(lv){
  const titles=['','견습 해커','리눅스 초보','파일 탐험가','명령어 마법사',
                 '그렙 위자드','파이프 마스터','보스 헌터','리눅스 영웅','터미널 신','BANDIT GOD'];
  return titles[Math.min(lv,10)]||'전설의 해커';
}

function setDiff(d){
  difficulty=d;
  ['normal','hard','hell'].forEach(x=>document.getElementById('btn'+x.charAt(0).toUpperCase()+x.slice(1)).className='diff-btn');
  document.getElementById('btn'+d.charAt(0).toUpperCase()+d.slice(1)).className='diff-btn active-'+d;
  const msgs={normal:'NORMAL 모드: 모든 답이 표시됩니다.',hard:'HARD 모드: 초보 명령어(Lv.0~6)는 직접 해결! 고급 명령어(Lv.7+)는 힌트 제공.',hell:'☠ HELL 모드: 모든 답이 숨겨집니다. 스스로 해결하세요!'};
  setDialogue('시스템',msgs[d]);
  if(activeMonster) updateHintDisplay(activeMonster.data);
}

function closeOverlay(){
  document.getElementById('overlay').classList.remove('show');
}

// ═══════════════════════════════════════════════════════════════
// INPUT HANDLERS
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='Escape'&&player.inBattle) endBattle();
});
document.addEventListener('keyup',e=>{ keys[e.key]=false; });

document.getElementById('termInput').addEventListener('keydown',e=>{
  if(e.key==='Enter') handleCommand();
  e.stopPropagation(); // prevent canvas getting arrow keys
});

canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const sx=(e.clientX-rect.left)*(canvas.width/rect.width);
  const sy=(e.clientY-rect.top)*(canvas.height/rect.height);

  // Check if clicked on a monster
  let clickedMonster=null;
  monsterInstances.forEach(m=>{
    if(!m.alive) return;
    const {x,y}=tileToScreen(m.tx,m.ty,camX,camY);
    const mx2=x+TW/2, my2=y-TH/4;
    const dist=Math.hypot(sx-mx2,sy-my2);
    if(dist<28) clickedMonster=m;
  });

  if(clickedMonster){
    // Move toward and engage
    const tx=Math.round(clickedMonster.tx), ty=Math.round(clickedMonster.ty);
    const px2=Math.round(player.tx), py2=Math.round(player.ty);
    const dist=Math.abs(px2-tx)+Math.abs(py2-ty);
    if(dist<=2) initiateEncounter(clickedMonster);
    else{
      // Find adjacent tile to monster
      const dirs=[{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
      for(const {dx,dy} of dirs){
        const nx=tx+dx,ny=ty+dy;
        if(nx>=0&&nx<MAPW&&ny>=0&&ny<MAPH&&tileMap[ny][nx]!==TILE_STONE){
          const path=findPath(px2,py2,nx,ny);
          if(path.length>0){
            player.path=[...path];
            // When arrives, encounter
            const lastStep=player.path[player.path.length-1];
            player.path.push({x:tx,y:ty,encounter:clickedMonster});
            const first=player.path.shift();
            startMoveTo(first.x,first.y);
            break;
          }
        }
      }
      // Simpler: just pathfind close
      const path=findPath(px2,py2,tx,ty);
      if(path.length>0){
        player.path=path.slice(0,-1); // go adjacent
        if(player.path.length===0){
          initiateEncounter(clickedMonster);
        } else {
          const first=player.path.shift();
          startMoveTo(first.x,first.y);
          // Check on arrival
          player._pendingEncounter=clickedMonster;
        }
      } else {
        initiateEncounter(clickedMonster);
      }
    }
    return;
  }

  // Click to move
  if(!player.inBattle){
    const tile=screenToTile(sx,sy,camX,camY);
    if(tileMap[tile.y][tile.x]!==TILE_STONE&&tileMap[tile.y][tile.x]!==TILE_WATER){
      const px2=Math.round(player.tx), py2=Math.round(player.ty);
      const path=findPath(px2,py2,tile.x,tile.y);
      if(path.length>0){
        player.path=[...path];
        const first=player.path.shift();
        startMoveTo(first.x,first.y);
      }
    }
  }
});

// Check pending encounter on arrival
const _origUpdate=updatePlayer;

// Tooltip
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const sx=(e.clientX-rect.left)*(canvas.width/rect.width);
  const sy=(e.clientY-rect.top)*(canvas.height/rect.height);
  const tip=document.getElementById('tooltip');

  let found=false;
  monsterInstances.forEach(m=>{
    if(!m.alive) return;
    const {x,y}=tileToScreen(m.tx,m.ty,camX,camY);
    const dist=Math.hypot(sx-(x+TW/2),sy-(y-TH/4));
    if(dist<28){
      tip.style.display='block';
      tip.style.left=(e.clientX+12)+'px';
      tip.style.top=(e.clientY-20)+'px';
      tip.innerHTML=`<b style="color:#ff5252">${m.data.name}</b><br>${m.data.desc}<br><span style="color:#ffd740">HP: ${m.hp}/${m.maxHp}</span>`;
      found=true;
    }
  });
  if(!found) tip.style.display='none';
});

// INIT
// ═══════════════════════════════════════════════════════════════
function initGame(){
  resizeCanvas();
  generateMap();
  initMonsters();
  player.tx=2; player.ty=2;
  camTargetX=0; camTargetY=0;
  updateHUD();
  requestAnimationFrame(render);
}

window.addEventListener('resize',()=>{ resizeCanvas(); });

// ── 모바일 방향키 패드 ────────────────────────────────────────
(function(){
  const map={dUp:'ArrowUp',dDown:'ArrowDown',dLeft:'ArrowLeft',dRight:'ArrowRight'};
  Object.entries(map).forEach(([id,key])=>{
    const btn=document.getElementById(id);
    if(!btn) return;
    // 터치 시작 → 키 누름
    btn.addEventListener('touchstart',e=>{
      e.preventDefault();
      keys[key]=true;
    },{passive:false});
    // 터치 끝 → 키 뗌
    btn.addEventListener('touchend',e=>{
      e.preventDefault();
      keys[key]=false;
    },{passive:false});
    // 마우스도 지원
    btn.addEventListener('mousedown',()=>keys[key]=true);
    btn.addEventListener('mouseup',()=>keys[key]=false);
  });
})();

initGame();
